<!DOCTYPE html>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Poppins',sans-serif;
background:#111;
color:#fff;
text-align:center;
}

h1{
letter-spacing:8px;
margin:40px 0;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:40px;
}

.card{
position:relative;
overflow:hidden;
border-radius:15px;
cursor:pointer;
}

.card img{
width:100%;
height:250px;
object-fit:cover;
transition:0.5s;
}

.card:hover img{
transform:scale(1.1);
}

.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
letter-spacing:3px;
}

/* HEADER NAVBAR */
.navbar{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 50px;
background:rgba(0,0,0,0.5);
backdrop-filter:blur(6px);
z-index:1000;
}

.navbar a{
color:white;
text-decoration:none;
margin:0 15px;
font-size:13px;
letter-spacing:2px;
transition:0.3s;
}

.navbar a:hover{
color:#d4af37;
}

.nav-center img{
width:55px;
}

/* PUSH CONTENT DOWN (important) */
body{
margin-top:80px;
}
</style>
</head>
