/* MOBILE */
@media(max-width:768px){
.navbar{padding:15px 20px;}
.film iframe{height:220px;}
.header{padding-top:100px;}
}

/* VIDEO WRAPPER */
.video-wrap{
position:relative;
cursor:pointer;
overflow:hidden;
border-radius:6px;
}

.video-wrap iframe{
pointer-events:none; /* disable click inside iframe */
transition:0.4s;
}

/* HOVER EFFECT */
.video-wrap:hover iframe{
transform:scale(1.05);
}

/* PLAY ICON */
.play-btn{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:rgba(0,0,0,0.6);
color:#fff;
padding:15px 20px;
border-radius:50%;
font-size:22px;
opacity:0;
transition:0.3s;
}

.video-wrap:hover .play-btn{
opacity:1;
}

/* MODAL */
.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:none;
align-items:center;
justify-content:center;
z-index:9999;
}

.modal iframe{
width:90%;
height:80%;
border:none;
}

.close-modal{
position:absolute;
top:20px;
right:30px;
color:#fff;
font-size:30px;
cursor:pointer;
}
</style>

}

function closeModal(){
  let modal = document.getElementById("videoModal");
  let player = document.getElementById("modalVideo");

  player.src = "";
  modal.style.display = "none";
}
</script>

<!-- YOUTUBE AUTO PAUSE SCRIPT -->
<script>
let players = [];

// load API
let tag = document.createElement('script');
tag.src = "https://www.youtube.com/iframe_api";
document.body.appendChild(tag);

function onYouTubeIframeAPIReady() {
  let iframes = document.querySelectorAll('iframe');

  iframes.forEach((iframe, i) => {
    players[i] = new YT.Player(iframe, {
      events: {
        'onStateChange': onPlayerStateChange
      }
    });
  });
}

function onPlayerStateChange(event) {
  if (event.data === YT.PlayerState.PLAYING) {
    players.forEach(player => {
      if (player !== event.target) {
        player.pauseVideo();
      }
    });
  }
}
</script>
