<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portraits | OM Wedding Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Poppins',sans-serif;
background:#0a0a0a;
color:#fff;
}

h1{
text-align:center;
padding:30px;
letter-spacing:6px;
}

.gallery{
column-count:3;
column-gap:15px;
padding:20px;
}

.gallery img{
width:100%;
margin-bottom:15px;
border-radius:12px;
transition:0.4s;
cursor:pointer;
}

.gallery img:hover{
transform:scale(1.03);
}

@media(max-width:900px){
.gallery{column-count:2;}
}

@media(max-width:500px){
.gallery{column-count:1;}
}
</style>
</head>

<body>

<h1>PORTRAITS</h1>

</html>
